<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do You Love Me?</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Patrick+Hand&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Patrick Hand', cursive;
            overflow: hidden;
        }

        /* -------- QUESTION SCREEN -------- */
        #question-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        #question-screen h1 {
            color: #fff;
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            text-align: center;
        }

        .buttons {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
        }

        #yes-btn, #no-btn {
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Patrick Hand', cursive;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        #yes-btn {
            background-color: #e74c7d;
            color: #fff;
            font-size: 1.2rem;
            padding: 15px 40px;
        }

        #yes-btn:hover {
            background-color: #ff6b9d;
            transform: scale(1.05);
        }

        #no-btn {
            background-color: #555;
            color: #ccc;
            font-size: 1.2rem;
            padding: 15px 40px;
        }

        #no-btn:hover {
            background-color: #666;
        }

        /* -------- LOVE SCREEN -------- */
        #love-screen {
            display: none;
            width: 100%;
            min-height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #love-text {
            font-family: 'Dancing Script', cursive;
            color: #e74c7d;
            font-size: 4rem;
            text-align: center;
            z-index: 2;
            text-shadow: 0 0 20px rgba(231, 76, 125, 0.5);
            animation: pulse 1s ease-in-out infinite alternate;
            padding: 0 220px;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        /* -------- POLAROID PHOTOS -------- */
        .photos-left, .photos-right {
            position: fixed;
            top: 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            z-index: 1;
            height: 100vh;
            justify-content: center;
        }

        .photos-left {
            left: 0;
        }

        .photos-right {
            right: 0;
        }

        .polaroid {
            background: #fff;
            padding: 10px 10px 35px 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transform: rotate(var(--rotation));
            transition: transform 0.3s ease;
            width: 180px;
        }

        .polaroid:hover {
            transform: rotate(0deg) scale(1.1);
            z-index: 10;
        }

        .polaroid img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
        }

        .polaroid .caption {
            text-align: center;
            font-family: 'Patrick Hand', cursive;
            font-size: 0.85rem;
            color: #333;
            margin-top: 8px;
        }

        /* -------- LANGUAGE LABEL -------- */
        #language-label {
            font-family: 'Patrick Hand', cursive;
            color: #888;
            font-size: 1rem;
            margin-top: 10px;
            z-index: 2;
            letter-spacing: 1px;
        }

        /* -------- FLOATING HEARTS -------- */
        .heart {
            position: fixed;
            font-size: 1.5rem;
            animation: floatUp linear infinite;
            opacity: 0;
            z-index: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* -------- RESPONSIVE -------- */
        @media (max-width: 900px) {
            .photos-left, .photos-right {
                position: relative;
                flex-direction: row;
                height: auto;
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
                padding: 10px;
            }

            .polaroid {
                width: 120px;
            }

            .polaroid img {
                height: 100px;
            }

            #love-text {
                font-size: 2.5rem;
                padding: 0 20px;
            }

            #love-screen {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <!-- ========== QUESTION SCREEN ========== -->
    <div id="question-screen">
        <h1>Do you love me? ❤️</h1>
        <div class="buttons">
            <button id="yes-btn" onclick="sayYes()">Yes</button>
            <button id="no-btn" onclick="sayNo()">No</button>
        </div>
    </div>

    <!-- ========== LOVE SCREEN ========== -->
    <div id="love-screen">
        <div class="photos-left">
            <!--
                REPLACE src with your own photo paths!
                Example: src="photo1.jpeg"
            -->
            <div class="polaroid" style="--rotation: -5deg;">
                <img src="photo1.jpeg" alt="Us 1">
                <div class="caption">You & Me 💕</div>
            </div>
            <div class="polaroid" style="--rotation: 3deg;">
                <img src="photo2.jpeg" alt="Us 2">
                <div class="caption">Forever ❤️</div>
            </div>
            <div class="polaroid" style="--rotation: -2deg;">
                <img src="photo3.jpeg" alt="Us 3">
                <div class="caption">My favorite 💖</div>
            </div>
        </div>

        <h1 id="love-text">I Love You</h1>
        <p id="language-label">English</p>

        <div class="photos-right">
            <!--
                REPLACE src with your own photo paths!
            -->
            <div class="polaroid" style="--rotation: 4deg;">
                <img src="photo4.jpeg" alt="Us 4">
                <div class="caption">Always 💗</div>
            </div>
            <div class="polaroid" style="--rotation: -3deg;">
                <img src="photo5.jpeg" alt="Us 5">
                <div class="caption">My heart 💝</div>
            </div>
            <div class="polaroid" style="--rotation: 6deg;">
                <img src="photo6.jpeg" alt="Us 6">
                <div class="caption">Us 💞</div>
            </div>
        </div>
    </div>

        let noCount = 0;
        let phraseIndex = 0;
        let yesFontSize = 1.2;
        let yesPadding = 15;
        let noFontSize = 1.2;
        let noPadding = 15;

        // ====== NO BUTTON LOGIC ======
        function sayNo() {
            noCount++;

            // Make YES bigger
            yesFontSize += 0.5;
            yesPadding += 10;
            document.getElementById('yes-btn').style.fontSize = yesFontSize + 'rem';
            document.getElementById('yes-btn').style.padding = yesPadding + 'px ' + (yesPadding + 25) + 'px';

            // Make NO smaller
            noFontSize = Math.max(0.3, noFontSize - 0.2);
            noPadding = Math.max(2, noPadding - 3);
            document.getElementById('no-btn').style.fontSize = noFontSize + 'rem';
            document.getElementById('no-btn').style.padding = noPadding + 'px ' + (noPadding + 5) + 'px';

            // After 5 tries, hide NO
            if (noCount >= 5) {
                document.getElementById('no-btn').style.display = 'none';
            }
        }

        // ====== YES BUTTON LOGIC ======
        function sayYes() {
            document.getElementById('question-screen').style.display = 'none';
            document.getElementById('love-screen').style.display = 'flex';

            // Start cycling phrases
            setInterval(() => {
                const current = lovePhrases[phraseIndex];
                document.getElementById('love-text').textContent = current.text;
                document.getElementById('language-label').textContent = current.lang;
                phraseIndex = (phraseIndex + 1) % lovePhrases.length;
            }, 500);

            // Start floating hearts
            startHearts();
        }

        // ====== FLOATING HEARTS ======
        function startHearts() {
            const heartEmojis = ['❤️', '💕', '💖', '💗', '💝', '💞', '💘', '🩷', '♥️'];

            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 1.5 + 0.8) + 'rem';
                heart.style.animationDuration = (Math.random() * 4 + 4) + 's';
                document.body.appendChild(heart);

                // Remove after animation
                setTimeout(() => heart.remove(), 8000);
            }, 300);
        }
    </script>

</html>
